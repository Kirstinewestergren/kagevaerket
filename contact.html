 <nav class="topnav" id="myTopnav">

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
      (function () {
        emailjs.init({
          publicKey: "PMf8u4RvUNFLCEzrU",
        });
      })();

      window.onload = function () {
        document
          .getElementById("contact-form")
          .addEventListener("submit", function (event) {
            event.preventDefault();

            emailjs.sendForm("service_vj4748i", "template_ec2oifn", this).then(
              function () {
                alert("Besked sendt!");
              },
              function (error) {
                alert("Fejl: " + error.text);
                console.log("FAILED...", error);
              },
            );
          });
      };
    </script>
  </head>

  <body>
    <form id="contact-form">
      <input type="hidden" name="time" value="Mar 10 2025 08:46" />

      <label>Navn</label><br />
      <input type="text" name="name" required /><br /><br />

      <label>Email</label><br />
      <input type="email" name="email" required /><br /><br />

      <label>Emne</label><br />
      <input type="text" name="title" required /><br /><br />

      <label>Besked</label><br />
      <textarea name="message" required></textarea><br /><br />

      <input type="submit" value="Send" />
    </form>

     <script src="kage.js"></script>
  </body>
